<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <title>StelarTex Visit Card</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="StelarTex">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-text-size-adjust: 100%;
            touch-action: manipulation;
        }

        .card {
            width: min(78vw, 700px);
            height: min(58vh, 400px);
            perspective: 1000px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            outline: none;

            opacity: 0;
            transform: translate3d(0, 110dvh, 0) scale(0.9);
            animation: popFromBottom 1.15s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            will-change: transform, opacity;
        }

        @keyframes popFromBottom {
            0% {
                opacity: 0;
                transform: translate3d(0, 110dvh, 0) scale(0.9);
            }

            65% {
                opacity: 1;
                transform: translate3d(0, -32px, 0) scale(1.04);
            }

            82% {
                opacity: 1;
                transform: translate3d(0, 12px, 0) scale(0.99);
            }

            100% {
                opacity: 1;
                transform: translate3d(0, 0, 0) scale(1);
            }
        }

        .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transition: transform 0.6s;
    transform-style: preserve-3d;

    border: none;
    border-radius: 18px;
    background: #ffffff;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.22);
}

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .front,
        .back {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;

            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;

            border-radius: 15px;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            background: #ffffff;
            color: #333;
            text-align: center;
            padding: 20px;
        }

        .back {
            transform: rotateY(180deg);
        }

        .circle {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 2px solid #333;

            display: flex;
            justify-content: center;
            align-items: center;

            position: relative;
            margin-bottom: 10px;
        }

        .circle span {
            font-size: 64px;
            font-weight: bold;
            color: #333;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .letter-s {
            top: 30%;
            transform: translate(-50%, -50%);
        }

        .letter-t {
            bottom: 29%;
            transform: translate(-50%, -50%);
        }

        .brand-name {
            font-size: 24px;
            font-weight: bold;
            color: #000;
            margin-top: 10px;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        p {
            font-size: 20px;
            margin: 5px 0;
            word-break: break-word;
        }

        @media (max-width: 480px) {
            .card {
                width: 80vw;
                height: 56vh;
            }

            .circle {
                width: 120px;
                height: 120px;
            }

            .circle span {
                font-size: 48px;
            }

            .brand-name {
                font-size: 20px;
            }

            h1 {
                font-size: 26px;
            }

            p {
                font-size: 16px;
            }
        }
    </style>
</head>

<body>

    <div class="card" role="button" tabindex="0" aria-label="Flip visit card">
        <div class="card-inner">

            <div class="front">
                <div class="circle">
                    <span class="letter-s">S</span>
                    <span class="letter-t">T</span>
                </div>

                <div class="brand-name">#StelarTex</div>
            </div>

            <div class="back">
                <h1>John Doe</h1>
                <p>Web Developer</p>
                <p>Email: john.doe@example.com</p>
                <p>Phone: (123) 456-7890</p>
            </div>

        </div>
    </div>

    <script>
        const card = document.querySelector('.card');

        function flipCard() {
            card.classList.toggle('flipped');
        }

        card.addEventListener('click', flipCard);

        card.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                flipCard();
            }
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('./sw.js')
                    .catch(function (error) {
                        console.log('Service Worker error:', error);
                    });
            });
        }
    </script>

</body>
</html>
